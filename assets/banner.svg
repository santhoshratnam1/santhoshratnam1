<svg width="1280" height="330" viewBox="0 0 1280 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shanmuga Ratnam Sivakumar — Game, Level and Technical Designer">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="55%" stop-color="#0e2247"/>
      <stop offset="100%" stop-color="#1b3a66"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfe9ff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#7fb2e8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7fb2e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d6e6"/>
    </linearGradient>
    <radialGradient id="headN" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3a4a66"/>
      <stop offset="100%" stop-color="#10182b"/>
    </radialGradient>
    <radialGradient id="fogG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fc4ee" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#9fc4ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="45%" r="78%">
      <stop offset="62%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- ============ SCENE ============ -->
  <rect width="1280" height="330" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#dcecff">
    <circle cx="150" cy="52" r="1.5"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="335" cy="88" r="1.1"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="245" cy="34" r="1"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="44" r="1.4"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="82" r="1.2"><animate attributeName="opacity" values="0.6;0.18;0.6" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="30" r="1"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="120" r="1"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="1220" cy="140" r="1.1"><animate attributeName="opacity" values="0.5;0.14;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- moon glow behind the crew -->
  <ellipse cx="640" cy="235" rx="430" ry="200" fill="url(#moon)"/>

  <!-- distant ruin silhouettes -->
  <g fill="#0a1428">
    <rect x="180" y="196" width="34" height="120" rx="6" transform="rotate(-4 197 256)"/>
    <rect x="228" y="236" width="26" height="80" rx="6"/>
    <rect x="1030" y="190" width="36" height="126" rx="6" transform="rotate(5 1048 253)"/>
    <rect x="1086" y="242" width="24" height="74" rx="6"/>
    <rect x="90" y="262" width="60" height="20" rx="8"/>
    <rect x="1130" y="268" width="70" height="18" rx="8"/>
  </g>

  <!-- ground -->
  <ellipse cx="640" cy="345" rx="820" ry="60" fill="#0b1a33"/>
  <ellipse cx="640" cy="352" rx="640" ry="48" fill="#0d2140"/>

  <!-- ============ THE CREW (chibi-bot homages) ============ -->

  <!-- ── SURVIVOR-BOT (Last of Us) far left — flashlight flicker ── -->
  <g transform="translate(465,312) scale(0.88)">
    <ellipse cx="0" cy="2" rx="42" ry="9" fill="#050b16" opacity="0.55"/>
    <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.6s" repeatCount="indefinite"/>
      <!-- flashlight beam -->
      <polygon points="-46,-66 -128,-46 -128,-84" fill="#ffeebb">
        <animate attributeName="opacity" values="0.30;0.10;0.26;0.05;0.30" dur="3.4s" repeatCount="indefinite"/>
      </polygon>
      <!-- legs / feet -->
      <rect x="-17" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/><rect x="4" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/>
      <ellipse cx="-10" cy="-2" rx="13" ry="6" fill="#182338"/><ellipse cx="10" cy="-2" rx="13" ry="6" fill="#182338"/>
      <!-- backpack -->
      <rect x="18" y="-84" width="20" height="34" rx="9" fill="#5a4630"/>
      <!-- body + flannel -->
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="url(#bodyW)"/>
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="#7a3b2e" opacity="0.85"/>
      <g stroke="#4e2018" stroke-width="3" opacity="0.7">
        <line x1="-12" y1="-80" x2="-12" y2="-26"/><line x1="8" y1="-80" x2="8" y2="-26"/>
        <line x1="-26" y1="-62" x2="26" y2="-62"/><line x1="-26" y1="-44" x2="26" y2="-44"/>
      </g>
      <!-- left arm holds flashlight -->
      <rect x="-42" y="-76" width="13" height="32" rx="6" fill="#7a3b2e"/>
      <circle cx="-36" cy="-46" r="7" fill="#182338"/>
      <rect x="-52" y="-72" width="16" height="10" rx="4" fill="#6f7788"/>
      <rect x="-30" y="-76" width="13" height="32" rx="6" fill="#00000000"/>
      <rect x="29" y="-76" width="13" height="32" rx="6" fill="#7a3b2e"/><circle cx="35" cy="-46" r="7" fill="#182338"/>
      <!-- head -->
      <circle cx="0" cy="-108" r="29" fill="url(#headN)"/>
      <rect x="-21" y="-121" width="42" height="25" rx="12" fill="#05080e"/>
      <g fill="#5ccbff">
        <rect x="-13" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.87;0.92;1" dur="4.6s" repeatCount="indefinite"/></rect>
        <rect x="4" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.87;0.92;1" dur="4.6s" repeatCount="indefinite"/></rect>
      </g>
      <!-- scruffy beard hint -->
      <path d="M -18 -92 Q 0 -82 18 -92 L 14 -86 Q 0 -78 -14 -86 Z" fill="#4a3624"/>
      <rect x="-2" y="-142" width="4" height="12" rx="2" fill="#2a3a55"/><circle cx="0" cy="-144" r="4" fill="#5ccbff"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.6s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ── WARGOD-BOT (God of War) center-left, biggest — axe frost pulse + slow raise ── -->
  <g transform="translate(590,320) scale(1.02)">
    <ellipse cx="0" cy="2" rx="46" ry="10" fill="#050b16" opacity="0.6"/>
    <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
      <rect x="-18" y="-30" width="14" height="28" rx="6" fill="url(#bodyW)"/><rect x="4" y="-30" width="14" height="28" rx="6" fill="url(#bodyW)"/>
      <ellipse cx="-11" cy="-2" rx="14" ry="6" fill="#182338"/><ellipse cx="11" cy="-2" rx="14" ry="6" fill="#182338"/>
      <!-- body: bare grey w/ red stripe + leather belt -->
      <rect x="-28" y="-82" width="56" height="56" rx="25" fill="url(#bodyW)"/>
      <path d="M -12 -82 L 2 -82 L -4 -26 L -18 -26 Z" fill="#c22f35"/>
      <rect x="-28" y="-40" width="56" height="12" rx="6" fill="#5a4630"/>
      <rect x="-30" y="-84" width="26" height="14" rx="7" fill="#6b4a2c"/>
      <!-- arms: left down, right holds axe -->
      <rect x="-44" y="-78" width="14" height="34" rx="7" fill="url(#bodyW)"/><circle cx="-37" cy="-46" r="8" fill="#182338"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 40 -74;-14 40 -74;0 40 -74" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
        <rect x="30" y="-78" width="14" height="34" rx="7" fill="url(#bodyW)"/><circle cx="37" cy="-48" r="8" fill="#182338"/>
        <!-- Leviathan-style axe -->
        <rect x="34" y="-112" width="6" height="66" rx="3" fill="#4a3624"/>
        <path d="M 40 -112 L 62 -104 L 56 -88 L 40 -94 Z" fill="#9fb6c4"/>
        <path d="M 40 -112 L 62 -104 L 56 -88 L 40 -94 Z" fill="#bfe9ff">
          <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.2s" repeatCount="indefinite"/>
        </path>
      </g>
      <!-- head + red stripe + beard -->
      <circle cx="0" cy="-112" r="31" fill="url(#headN)"/>
      <rect x="-23" y="-126" width="46" height="27" rx="13" fill="#05080e"/>
      <path d="M -6 -143 L 2 -143 L 0 -99 L -8 -99 Z" fill="#c22f35"/>
      <g fill="#5ccbff">
        <rect x="-15" y="-121" width="10" height="15" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.55;0.6;1" dur="5.2s" repeatCount="indefinite"/></rect>
        <rect x="5" y="-121" width="10" height="15" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.55;0.6;1" dur="5.2s" repeatCount="indefinite"/></rect>
      </g>
      <path d="M -20 -96 Q 0 -80 20 -96 L 16 -84 Q 0 -70 -16 -84 Z" fill="#7a4a2b"/>
      <rect x="-2" y="-147" width="4" height="12" rx="2" fill="#2a3a55"/><circle cx="0" cy="-149" r="4" fill="#5ccbff"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ── HUNTRESS-BOT (Horizon) center-right — bow + focus scan ── -->
  <g transform="translate(715,316) scale(0.95)">
    <ellipse cx="0" cy="2" rx="44" ry="9" fill="#050b16" opacity="0.6"/>
    <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      <rect x="-17" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/><rect x="4" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/>
      <ellipse cx="-10" cy="-2" rx="13" ry="6" fill="#182338"/><ellipse cx="10" cy="-2" rx="13" ry="6" fill="#182338"/>
      <!-- body teal w/ sash -->
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="url(#bodyW)"/>
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="#1f6f6b" opacity="0.85"/>
      <path d="M -26 -72 L 26 -50 L 26 -38 L -26 -60 Z" fill="#c9a227" opacity="0.9"/>
      <!-- right arm holds bow -->
      <rect x="29" y="-76" width="13" height="32" rx="6" fill="#1f6f6b"/><circle cx="35" cy="-46" r="7" fill="#182338"/>
      <path d="M 44 -96 Q 62 -62 44 -28" fill="none" stroke="#5a3c22" stroke-width="5" stroke-linecap="round"/>
      <line x1="44" y1="-96" x2="44" y2="-28" stroke="#dce6f0" stroke-width="1.6">
        <animate attributeName="x1" values="44;38;44;44" keyTimes="0;0.18;0.28;1" dur="3.4s" repeatCount="indefinite"/>
      </line>
      <rect x="-42" y="-76" width="13" height="32" rx="6" fill="#1f6f6b"/><circle cx="-36" cy="-46" r="7" fill="#182338"/>
      <!-- head + big red hair -->
      <circle cx="0" cy="-108" r="29" fill="url(#headN)"/>
      <path d="M -30 -104 Q -34 -140 0 -142 Q 34 -140 30 -104 Q 22 -128 0 -130 Q -22 -128 -30 -104 Z" fill="#b3502a"/>
      <path d="M -30 -104 Q -36 -84 -30 -66 L -22 -70 Q -26 -88 -24 -102 Z" fill="#9c4423"/>
      <path d="M 30 -104 Q 36 -84 30 -66 L 22 -70 Q 26 -88 24 -102 Z" fill="#9c4423"/>
      <rect x="-21" y="-121" width="42" height="25" rx="12" fill="#05080e"/>
      <g fill="#5ccbff">
        <rect x="-13" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.72;0.77;1" dur="4.2s" repeatCount="indefinite"/></rect>
        <rect x="4" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.72;0.77;1" dur="4.2s" repeatCount="indefinite"/></rect>
      </g>
      <!-- Focus device pulse -->
      <circle cx="24" cy="-114" r="3.5" fill="#7fd0ff"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/><animate attributeName="r" values="3.5;5;3.5" dur="1.8s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ── EXPEDITIONER-BOT (Expedition 33) far right — rapier salute gleam ── -->
  <g transform="translate(838,312) scale(0.88)">
    <ellipse cx="0" cy="2" rx="42" ry="9" fill="#050b16" opacity="0.55"/>
    <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.4s" begin="1.6s" repeatCount="indefinite"/>
      <rect x="-17" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/><rect x="4" y="-30" width="13" height="28" rx="6" fill="url(#bodyW)"/>
      <ellipse cx="-10" cy="-2" rx="13" ry="6" fill="#182338"/><ellipse cx="10" cy="-2" rx="13" ry="6" fill="#182338"/>
      <!-- navy coat + gold trim + white collar -->
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="url(#bodyW)"/>
      <rect x="-26" y="-80" width="52" height="54" rx="24" fill="#22314f" opacity="0.9"/>
      <line x1="0" y1="-80" x2="0" y2="-26" stroke="#c9a227" stroke-width="3"/>
      <path d="M -14 -80 L 0 -68 L 14 -80 Z" fill="#e8e2d4"/>
      <!-- left arm metal, raised with rapier -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 -36 -72;8 -36 -72;0 -36 -72" dur="3.4s" begin="1.6s" repeatCount="indefinite"/>
        <rect x="-43" y="-78" width="13" height="32" rx="6" fill="#8a9099"/><circle cx="-36" cy="-48" r="7" fill="#182338"/>
        <rect x="-39" y="-130" width="5" height="56" rx="2.5" fill="#d8dde2"/>
        <rect x="-44" y="-78" width="16" height="6" rx="3" fill="#c9a227"/>
        <rect x="-39" y="-130" width="5" height="56" rx="2.5" fill="#ffffff" opacity="0">
          <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.45;0.55;0.68;1" dur="3.4s" repeatCount="indefinite"/>
        </rect>
      </g>
      <rect x="29" y="-76" width="13" height="32" rx="6" fill="#22314f"/><circle cx="35" cy="-46" r="7" fill="#182338"/>
      <!-- head + beret -->
      <circle cx="0" cy="-108" r="29" fill="url(#headN)"/>
      <rect x="-21" y="-121" width="42" height="25" rx="12" fill="#05080e"/>
      <g fill="#5ccbff">
        <rect x="-13" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.4;0.45;1" dur="4.9s" repeatCount="indefinite"/></rect>
        <rect x="4" y="-116" width="9" height="14" rx="4"><animate attributeName="opacity" values="1;1;0.15;1" keyTimes="0;0.4;0.45;1" dur="4.9s" repeatCount="indefinite"/></rect>
      </g>
      <path d="M -28 -126 Q -30 -140 -6 -142 Q 24 -144 26 -132 Q 10 -136 -4 -132 Q -20 -128 -28 -126 Z" fill="#8c2f35"/>
      <circle cx="-24" cy="-136" r="3" fill="#8c2f35"/>
    </g>
  </g>

  <!-- fog drifting across the crew -->
  <ellipse cx="430" cy="300" rx="260" ry="42" fill="url(#fogG)">
    <animateTransform attributeName="transform" type="translate" values="-50 0;50 0;-50 0" dur="22s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="880" cy="308" rx="300" ry="46" fill="url(#fogG)">
    <animateTransform attributeName="transform" type="translate" values="60 0;-60 0;60 0" dur="26s" repeatCount="indefinite"/>
  </ellipse>

  <!-- grass rim -->
  <g fill="#0e2d34">
    <path d="M 0 330 L 14 306 L 26 330 Z"/><path d="M 30 330 L 40 312 L 52 330 Z"/><path d="M 68 330 L 80 302 L 94 330 Z"/>
    <path d="M 300 330 L 312 308 L 324 330 Z"/><path d="M 350 330 L 360 314 L 372 330 Z"/>
    <path d="M 920 330 L 932 310 L 944 330 Z"/><path d="M 985 330 L 996 306 L 1010 330 Z"/>
    <path d="M 1180 330 L 1194 304 L 1208 330 Z"/><path d="M 1216 330 L 1226 314 L 1238 330 Z"/><path d="M 1250 330 L 1262 308 L 1274 330 Z"/>
    <path d="M 120 330 L 132 310 L 144 330 Z"/><path d="M 1120 330 L 1132 312 L 1144 330 Z"/>
  </g>

  <!-- vignette -->
  <rect width="1280" height="330" fill="url(#vig)"/>

  <!-- ============ TITLE ============ -->
  <text x="640" y="74" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#f2f6fc" letter-spacing="3" style="paint-order:stroke;stroke:#000000;stroke-width:0.6px;stroke-opacity:0.4">SHANMUGA RATNAM SIVAKUMAR</text>
  <text x="640" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#9fc4ee" letter-spacing="8">GAME &#183; LEVEL &#183; TECHNICAL DESIGNER</text>
  <text x="640" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6f92c4" letter-spacing="5" opacity="0.95">UNREAL ENGINE 5 &#183; UNITY</text>
</svg>
