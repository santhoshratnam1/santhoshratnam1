name: generate snake game

on:
  schedule:
    - cron: "0 0 * * *"   # refresh daily
  workflow_dispatch:        # allow manual run
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: santhoshratnam1
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=e63946
            dist/snake.gif?palette=github-dark&color_snake=e63946

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
